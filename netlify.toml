[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["stripe", "@supabase/supabase-js"]
  included_files = ["netlify/functions/**/*.ts", "netlify/functions/**/*.js"]

[dev]
  command = "npm run dev"
  targetPort = 4321
  port = 8888
  auto_launch = false
  framework = "astro"

# API routes are handled by Astro automatically